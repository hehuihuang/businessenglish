<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商务英语知识图谱 | Business English Knowledge Base</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=Playfair+Display:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <button type="button" class="header-brand" onclick="App.goHome()" aria-label="返回全部课题">
        <span class="brand-icon" aria-hidden="true">📚</span>
        <div class="brand-text">
          <h1>商务英语知识图谱</h1>
          <p>Business English Knowledge Base · 50 Topics</p>
        </div>
      </button>

      <div class="header-tools">
        <div class="header-search">
          <label class="sr-only" for="search-input">搜索课题</label>
          <input
            type="text"
            id="search-input"
            placeholder="搜索词汇、短语、主题... Search topics, phrases..."
            autocomplete="off"
          >
          <span class="search-icon" aria-hidden="true">🔍</span>
          <button type="button" class="search-clear" id="search-clear" title="清除搜索" aria-label="清除搜索">✕</button>
        </div>

        <a class="header-support" href="donate.html">赞赏支持</a>
      </div>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar" id="sidebar" aria-label="课题导航">
      <div class="sidebar-inner">

        <div class="sidebar-section sidebar-track-block sidebar-track-group" id="business-track">
          <button
            type="button"
            class="sidebar-track-toggle active expanded"
            id="btn-business"
            onclick="App.toggleTrack('businessenglish')"
            aria-expanded="true"
            aria-controls="business-track-content"
          >
            <span class="sidebar-track-heading">
              <span class="sidebar-track-title">BUSINESSENGLISH</span>
              <span class="sidebar-track-subtitle">(全部40个课题)</span>
            </span>
            <span class="sidebar-track-meta">
              <span class="count-badge" id="count-business">40</span>
              <span class="sidebar-track-chevron" aria-hidden="true">v</span>
            </span>
          </button>

          <div class="sidebar-track-content" id="business-track-content">
            <div class="sidebar-section">
              <h3 class="sidebar-label">按类别浏览</h3>
              <div id="category-list" class="category-list"></div>
            </div>

            <div class="sidebar-section">
              <h3 class="sidebar-label">热门标签</h3>
              <div id="tag-cloud" class="tag-cloud"></div>
            </div>
          </div>
        </div>

        <div class="sidebar-section sidebar-track-block sidebar-track-group" id="job-track">
          <button
            type="button"
            class="sidebar-track-toggle expanded"
            id="btn-job"
            onclick="App.toggleTrack('job_interview')"
            aria-expanded="true"
            aria-controls="job-track-content"
          >
            <span class="sidebar-track-heading">
              <span class="sidebar-track-title">JOB_INTERVIEW</span>
              <span class="sidebar-track-subtitle">(全部10个课题)</span>
            </span>
            <span class="sidebar-track-meta">
              <span class="count-badge" id="count-job">10</span>
              <span class="sidebar-track-chevron" aria-hidden="true">v</span>
            </span>
          </button>

          <div class="sidebar-track-content" id="job-track-content">
            <div id="job-lesson-list" class="job-lesson-list"></div>
          </div>
        </div>

      </div>
    </aside>

    <main class="main-content" id="main-content">
      <section class="panel" id="panel-list">
        <div class="panel-header">
          <h2 id="panel-title">BUSINESSENGLISH</h2>
          <span class="result-count" id="result-count" aria-live="polite"></span>
        </div>
        <p class="panel-lead">在 Business English 40 课与 Job Interview 10 课之间切换浏览，支持分类、标签与关键词检索。</p>
        <div class="support-strip">
          <div class="support-strip-copy">
            <p class="support-strip-label">Support The Project</p>
            <p class="support-strip-text">50 个课题，覆盖商务英语与求职面试表达，免费开放。如果这份知识库帮到了你，可以请我喝杯咖啡。</p>
          </div>
          <div class="support-strip-actions">
            <a class="support-strip-link" href="donate.html">赞赏支持</a>
            <a class="support-strip-link is-secondary" href="download.html">资料下载</a>
          </div>
        </div>
        <div class="context-bar" id="context-bar">
          <div class="context-copy">
            <p class="context-label" id="context-label">Business English track</p>
            <p class="context-description" id="context-description" aria-live="polite"></p>
          </div>
          <button type="button" class="context-reset" id="context-reset">重置视图</button>
        </div>

        <div class="lesson-grid" id="lesson-grid"></div>
      </section>

      <section class="panel hidden" id="panel-detail">
        <div class="panel-kicker" aria-hidden="true">
          <span class="rule"></span>
          <span class="kicker-text">Lesson Notebook</span>
          <span class="rule"></span>
        </div>

        <div class="detail-nav">
          <button type="button" class="btn-back" onclick="App.goBack()">← 返回列表</button>
          <div class="detail-nav-arrows">
            <button type="button" class="btn-prev" id="btn-prev" onclick="App.navigateLesson(-1)" title="上一课">&#8592; 上一课</button>
            <button type="button" class="btn-next" id="btn-next" onclick="App.navigateLesson(1)" title="下一课">下一课 &#8594;</button>
          </div>
        </div>

        <div class="detail-layout">
          <div class="detail-primary">
            <div class="detail-header" id="detail-header"></div>
            <div class="detail-body" id="detail-body"></div>
            <div class="detail-footer-nav" id="detail-footer-nav"></div>
            <div class="related-section" id="related-section"></div>
          </div>

          <aside class="detail-rail" id="detail-rail" aria-label="课程导航与统计"></aside>
        </div>
      </section>

    </main>
  </div>

  <button type="button" class="sidebar-toggle" id="sidebar-toggle" onclick="App.toggleSidebar()" title="菜单" aria-label="打开导航">☰</button>

  <script src="data/lessons_01_08.js"></script>
  <script src="data/lessons_09_16.js"></script>
  <script src="data/lessons_17_24.js"></script>
  <script src="data/lessons_25_32.js"></script>
  <script src="data/lessons_33_40.js"></script>
  <script src="data/job_interview_lessons.js"></script>
  <script src="data/data.js"></script>
  <script src="data/job_interview_docs.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
